name: Build FHIR Container

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "input/fsh/**"
      - "sushi-config.yaml"
      - "docker/**"
      - ".github/workflows/build-container.yml"
  pull_request:
    paths:
      - "input/fsh/**"
      - "sushi-config.yaml"
      - "docker/**"
      - ".github/workflows/build-container.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/pcor-mii-fhir-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MII_PRO_VERSION=2026.4.1

      - name: Smoke test (only on PR, no push)
        if: github.event_name == 'pull_request'
        run: |
          docker build --build-arg MII_PRO_VERSION=2026.4.1 -t pcor-mii-fhir-server:test -f docker/Dockerfile .
          # Container starten, auf /fhir/metadata warten, dann clean
          docker run -d --name pcor-mii-test -p 8080:8080 pcor-mii-fhir-server:test
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/fhir/metadata > /dev/null; then
              echo "Server up after $i × 5s"
              break
            fi
            sleep 5
          done
          # Check: ist mii-qst-pro-promis-16 vorgeladen?
          curl -s "http://localhost:8080/fhir/Questionnaire?url=https://www.medizininformatik-initiative.de/fhir/ext/modul-pro/Questionnaire/mii-qst-pro-promis-16&_summary=count" | \
            jq -e '.total >= 1' && echo "✓ PROMIS-16 loaded"
          docker logs pcor-mii-test | tail -50
          docker stop pcor-mii-test
