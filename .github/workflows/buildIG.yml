name: Build IG and Deploy

on:
  push:
    branches: [main, development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install Jekyll
        run: gem install jekyll

      - name: Cache FHIR packages
        uses: actions/cache@v4
        with:
          path: ~/.fhir/packages
          key: fhir-packages-${{ hashFiles('sushi-config.yaml') }}
          restore-keys: fhir-packages-

      - name: Cache IG Publisher JAR
        uses: actions/cache@v4
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-latest

      - name: Update IG Publisher (download if cache miss)
        run: |
          chmod +x _updatePublisher.sh
          ./_updatePublisher.sh -y

      - name: Run SUSHI (triggers FHIR package download to ~/.fhir/packages)
        run: |
          npm install -g fsh-sushi
          sushi .

      - name: Render PROMIS translation tables into pagecontent
        # Reads PROMIS Questionnaires from the MII PRO-Modul package (downloaded above by SUSHI)
        # and injects DE/EN/Code/Ordinal tables between AUTO-TRANSLATION-TABLE markers in the
        # PROMIS-29.md, PROMIS-16.md and PROMIS-Cognitive-Function.md pagecontent files.
        # Idempotent: re-runs replace the section without touching surrounding content.
        run: python3 scripts/render-promis-translations.py

      - name: Build IG
        run: |
          chmod +x _build.sh
          ./_build.sh -y

      - name: Upload built IG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ig-output
          path: output
          retention-days: 14

  deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ig-output
          path: output

      - name: Deploy main to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: true
          commit_message: "deploy(main): ${{ github.sha }}"

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ig-output
          path: output

      - name: Deploy PR preview to gh-pages /preview/pr-N
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          destination_dir: preview/pr-${{ github.event.pull_request.number }}
          keep_files: true
          commit_message: "deploy(pr-${{ github.event.pull_request.number }}): ${{ github.event.pull_request.head.sha }}"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            🚀 **PR Preview deployed**

            📖 Preview (DE): https://bih-cei.github.io/PCOR-MII/preview/pr-${{ github.event.pull_request.number }}/de/
            📖 Preview (EN): https://bih-cei.github.io/PCOR-MII/preview/pr-${{ github.event.pull_request.number }}/en/
            🌐 Sprach-Picker (Root, JS-Redirect): https://bih-cei.github.io/PCOR-MII/preview/pr-${{ github.event.pull_request.number }}/
            🕐 Commit `${{ github.event.pull_request.head.sha }}` · Run ${{ github.run_id }}

            *Wird beim Schließen des PRs automatisch entfernt.*
