# Lokales Dev-Setup für den PCOR-MII FHIR Server.
#
# Usage:
#   cd docker/
#   docker compose up --build
#
# HAPI ist dann erreichbar unter:
#   - Web UI:  http://localhost:8097/
#   - FHIR:    http://localhost:8097/fhir
#
# Port 8097 ist im zentralen Port-Registry (~/.claude/ports.yaml) für PCOR-MII reserviert,
# parallel zu form-manager-hapi (8095) und oncology-hapi-cr (8096).
#
# Pre-loaded Packages: MII PRO 2026.4.1 + PCOR-MII (aus diesem Repo) + SDC 3.0.0.
# Pilot-Setup — H2 in-memory DB, kein Persistence, kein Auth.

services:
  pcor-mii-fhir:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MII_PRO_VERSION: "2026.4.1"
    container_name: pcor-mii-fhir
    ports:
      - "8097:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/fhir/metadata"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
